services:
  postgres:
    image: postgres:16-alpine
    container_name: multi-site-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: multi_site_backend
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d multi_site_backend"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
