name: Deploy Master Panel VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Validate SSH connectivity
        run: |
          set -euo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_PORT"
          test -n "$VPS_USER"
          test -n "$VPS_APP_DIR"
          echo "Resolving $VPS_HOST"
          getent ahostsv4 "$VPS_HOST"
          echo "Checking TCP reachability on $VPS_HOST:$VPS_PORT"
          nc -zv -w 10 "$VPS_HOST" "$VPS_PORT"

      - name: Add known hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -T 10 -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync repo to VPS
        run: |
          set -euo pipefail
          rsync -az --delete \
            -e "ssh -p $VPS_PORT -o StrictHostKeyChecking=yes -o ConnectTimeout=20" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'dist' \
            --exclude '.env' \
            ./ "$VPS_USER@$VPS_HOST:$VPS_APP_DIR/"

      - name: Build and restart backend
        run: |
          set -euo pipefail
          ssh \
            -p "$VPS_PORT" \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=20 \
            "$VPS_USER@$VPS_HOST" \
            "cd $VPS_APP_DIR && docker compose -f docker-compose.vps.yml up -d --build"
